name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Packaged mirror is in sync
        run: node scripts/sync-plugin-skill.mjs --check

      - name: JavaScript syntax
        run: |
          node --check references/interceptor.js
          node --check scripts/codex-cdp-bridge.mjs
          node --check scripts/sync-plugin-skill.mjs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Provider privacy lint
        run: python3 scripts/lint-providers.py

      - name: Tests
        run: |
          pip install pytest
          python -m pytest tests/ -q
